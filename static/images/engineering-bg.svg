<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2b2b2b" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <circle cx="300" cy="200" r="3" fill="#ef4444"/>
  <circle cx="600" cy="400" r="3" fill="#ef4444"/>
  <circle cx="900" cy="300" r="3" fill="#ef4444"/>
  <circle cx="1200" cy="500" r="3" fill="#ef4444"/>

  <line x1="300" y1="200" x2="600" y2="400" stroke="#ef4444" stroke-width="1"/>
  <line x1="600" y1="400" x2="900" y2="300" stroke="#ef4444" stroke-width="1"/>
  <line x1="900" y1="300" x2="1200" y2="500" stroke="#ef4444" stroke-width="1"/>
</svg>
